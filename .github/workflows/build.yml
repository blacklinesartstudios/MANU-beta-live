name: 💙 Build Manubeta.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyinstaller mss pillow requests pystray

    - name: Build Manubeta.exe
      run: |
        pyinstaller --onefile --windowed --noconsole --name "Manubeta" manubeta_app.py

    - name: Upload .exe as download
      uses: actions/upload-artifact@v4
      with:
        name: Manubeta-Windows-exe
        path: dist/Manubeta.exe
        retention-days: 90
